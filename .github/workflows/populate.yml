      # =============================================================
      # MKVToolNix
      # Source: mkvtoolnix.download (no GitHub releases)
      # Includes: mkvmerge, mkvextract, mkvpropedit, mkvinfo
      # =============================================================

      - name: "MKVToolNix: Detect latest version"
        if: needs.check-versions.outputs.mkvtoolnix == 'true'
        id: mkvtoolnix_meta
        run: |
          VER=$(curl -sf "https://mkvtoolnix.download/sources/" \
            | grep -oP 'mkvtoolnix-\K[0-9.]+(?=\.tar\.xz")' | sort -V | tail -1)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "→ MKVToolNix latest: $VER"

      - name: "MKVToolNix: Linux x86_64 (AppImage)"
        if: needs.check-versions.outputs.mkvtoolnix == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          VER="${{ steps.mkvtoolnix_meta.outputs.version }}"
          echo "→ Downloading MKVToolNix AppImage"
          curl -fL --retry 3 -o work/mkvtoolnix.AppImage \
            "https://mkvtoolnix.download/appimage/MKVToolNix_GUI-${VER}-x86_64.AppImage"
          chmod +x work/mkvtoolnix.AppImage
          # Extract CLI tools from AppImage
          mkdir -p work/appimage_extract
          cd work/appimage_extract
          ../mkvtoolnix.AppImage --appimage-extract > /dev/null 2>&1
          cd ../..
          mkdir -p work/pkg
          for bin in mkvmerge mkvextract mkvpropedit mkvinfo; do
            BIN_PATH=$(find work/appimage_extract -name "$bin" -type f | head -1)
            if [ -n "$BIN_PATH" ]; then
              cp "$BIN_PATH" "work/pkg/$bin" && chmod +x "work/pkg/$bin"
            fi
          done
          if [ "$(ls work/pkg/ | wc -l)" -gt 0 ]; then
            tar -czf staging/mkvtoolnix-linux-x86_64.tar.gz -C work/pkg .
            echo "✓ mkvtoolnix-linux-x86_64.tar.gz"
          else
            echo "⚠ No MKVToolNix binaries found in AppImage"
          fi
          rm -rf work/appimage_extract work/pkg work/mkvtoolnix.AppImage

      - name: "MKVToolNix: Windows x86_64"
        if: needs.check-versions.outputs.mkvtoolnix == 'true'
        run: |
          set -euo pipefail
          VER="${{ steps.mkvtoolnix_meta.outputs.version }}"
          echo "→ Downloading MKVToolNix Windows portable"
          curl -fL --retry 3 -o work/mkvtoolnix.7z \
            "https://mkvtoolnix.download/windows/releases/${VER}/mkvtoolnix-64-bit-${VER}.7z"
          mkdir -p work/extract
          7z x work/mkvtoolnix.7z -owork/extract -y > /dev/null 2>&1
          mkdir -p work/pkg
          for bin in mkvmerge.exe mkvextract.exe mkvpropedit.exe mkvinfo.exe; do
            BIN_PATH=$(find work/extract -name "$bin" -type f | head -1)
            if [ -n "$BIN_PATH" ]; then
              cp "$BIN_PATH" "work/pkg/$bin"
            fi
          done
          if [ "$(ls work/pkg/ | wc -l)" -gt 0 ]; then
            (cd work/pkg && zip -q ../../staging/mkvtoolnix-windows-x86_64.zip *.exe)
            echo "✓ mkvtoolnix-windows-x86_64.zip"
          else
            echo "⚠ No MKVToolNix binaries found in archive"
          fi
          rm -rf work/extract work/pkg work/mkvtoolnix.7z

      - name: "MKVToolNix: macOS (DMG)"
        if: needs.check-versions.outputs.mkvtoolnix == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          VER="${{ steps.mkvtoolnix_meta.outputs.version }}"
          echo "→ Downloading MKVToolNix macOS DMG"
          curl -fL --retry 3 -o work/mkvtoolnix.dmg \
            "https://mkvtoolnix.download/macos/MKVToolNix-${VER}.dmg"
          mkdir -p work/extract
          7z x work/mkvtoolnix.dmg -owork/extract -y > /dev/null 2>&1
          mkdir -p work/pkg
          for bin in mkvmerge mkvextract mkvpropedit mkvinfo; do
            BIN_PATH=$(find work/extract -name "$bin" -type f | head -1)
            if [ -n "$BIN_PATH" ]; then
              cp "$BIN_PATH" "work/pkg/$bin" && chmod +x "work/pkg/$bin"
            fi
          done
          if [ "$(ls work/pkg/ | wc -l)" -gt 0 ]; then
            tar -czf staging/mkvtoolnix-macos-aarch64.tar.gz -C work/pkg .
            echo "✓ mkvtoolnix-macos-aarch64.tar.gz"
          else
            echo "⚠ No MKVToolNix binaries found in DMG"
          fi
          rm -rf work/extract work/pkg work/mkvtoolnix.dmg

      # =============================================================
      # get_iplayer
      # Source: get-iplayer/get_iplayer (Perl script)
      #         get-iplayer/get_iplayer_win32 (Windows installer)
      # =============================================================

      - name: "get_iplayer: Fetch latest release tags"
        if: needs.check-versions.outputs.get_iplayer == 'true'
        id: getiplayer_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCRIPT_TAG=$(gh api repos/get-iplayer/get_iplayer/releases/latest --jq '.tag_name' 2>/dev/null || echo "v3.36")
          echo "script_tag=$SCRIPT_TAG" >> "$GITHUB_OUTPUT"
          WIN_TAG=$(gh api repos/get-iplayer/get_iplayer_win32/releases/latest --jq '.tag_name' 2>/dev/null || echo "3.36.0")
          echo "win_tag=$WIN_TAG" >> "$GITHUB_OUTPUT"
          echo "→ get_iplayer: script=$SCRIPT_TAG, win=$WIN_TAG"

      - name: "get_iplayer: Perl script (Linux/macOS)"
        if: needs.check-versions.outputs.get_iplayer == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          TAG="${{ steps.getiplayer_meta.outputs.script_tag }}"
          echo "→ Downloading get_iplayer Perl script ($TAG)"
          curl -fL --retry 3 -o work/get_iplayer \
            "https://raw.githubusercontent.com/get-iplayer/get_iplayer/${TAG}/get_iplayer"
          chmod +x work/get_iplayer
          mkdir -p work/pkg && cp work/get_iplayer work/pkg/get_iplayer
          # Single Perl script works on all Unix platforms
          tar -czf staging/get_iplayer-linux-x86_64.tar.gz -C work/pkg get_iplayer
          cp staging/get_iplayer-linux-x86_64.tar.gz staging/get_iplayer-linux-aarch64.tar.gz
          cp staging/get_iplayer-linux-x86_64.tar.gz staging/get_iplayer-linux-armhf.tar.gz
          cp staging/get_iplayer-linux-x86_64.tar.gz staging/get_iplayer-macos-aarch64.tar.gz
          rm -rf work/pkg work/get_iplayer
          echo "✓ get_iplayer Perl script (all Unix platforms)"

      - name: "get_iplayer: Windows x86_64 installer"
        if: needs.check-versions.outputs.get_iplayer == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          WIN_TAG="${{ steps.getiplayer_meta.outputs.win_tag }}"
          echo "→ Downloading get_iplayer Windows installer ($WIN_TAG)"
          curl -fL --retry 3 -o staging/get_iplayer-windows-x86_64-setup.exe \
            "https://github.com/get-iplayer/get_iplayer_win32/releases/download/${WIN_TAG}/get_iplayer-${WIN_TAG}-windows-x64-setup.exe"
          echo "✓ get_iplayer-windows-x86_64-setup.exe"

      # =============================================================
      # Upload artifact
      # =============================================================

      - name: List produced assets
        run: |
          echo "=== Binary tools produced ==="
          ls -lh staging/ 2>/dev/null || echo "No assets in staging"
          echo "Total: $(ls staging/ 2>/dev/null | wc -l) assets"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-tools
          path: staging/
          retention-days: 1
          if-no-files-found: warn

  # =====================================================================
  # Job 2: Build Python tools via PyInstaller
  # Matrix across platforms: Linux x86_64, Linux aarch64, Windows, macOS
  # On scheduled runs, only runs if any Python tool has a new version.
  # =====================================================================
  build-python-tools:
    needs: [check-versions]
    if: >-
      needs.check-versions.outputs.python_tools == 'true' &&
      (github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'update-tools'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packages and PyInstaller
        run: |
          pip install --upgrade pip
          pip install pyinstaller votify gytmdl gamdl ofscraper

      - name: Generate entry-point wrapper scripts
        shell: python
        run: |
          """Generate small Python scripts from console_scripts entry points.

          On Windows, pip creates .exe launchers that PyInstaller cannot analyse.
          This step writes a <tool>_entry.py for each tool that simply imports
          and calls the real entry-point function."""
          import sys, os
          # Force UTF-8 output on Windows (cp1252 cannot encode Unicode symbols)
          if sys.platform == "win32":
              sys.stdout.reconfigure(encoding="utf-8")
              os.environ["PYTHONIOENCODING"] = "utf-8"

          from importlib.metadata import entry_points
          import pathlib

          tools = ["votify", "gytmdl", "gamdl", "ofscraper"]
          found = {}
          for ep in entry_points(group="console_scripts"):
              if ep.name in tools:
                  mod, func = ep.value.split(":")
                  script = f"from {mod} import {func}\n{func}()\n"
                  path = pathlib.Path(f"{ep.name}_entry.py")
                  path.write_text(script, encoding="utf-8")
                  found[ep.name] = str(path)
                  print(f"[OK] Generated {path}  ({ep.value})")

          for t in tools:
              if t not in found:
                  print(f"[SKIP] No console_scripts entry point found for {t}")

      - name: Build executables (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p staging
          for tool in votify gytmdl gamdl ofscraper; do
            ENTRY="${tool}_entry.py"
            if [ -f "$ENTRY" ]; then
              echo "→ Building $tool from $ENTRY"
              pyinstaller --onefile --name "$tool" --distpath dist "$ENTRY" 2>&1 || {
                echo "⚠ PyInstaller failed for $tool"
                continue
              }
              if [ -f "dist/$tool" ]; then
                chmod +x "dist/$tool"
                mkdir -p pkg && cp "dist/$tool" "pkg/$tool"
                tar -czf "staging/${tool}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" -C pkg "$tool"
                rm -rf pkg
                echo "✓ ${tool}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
              fi
            else
              echo "⚠ $tool entry-point script not found"
            fi
            rm -rf build dist *.spec
          done

      - name: Build executables (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          foreach ($tool in @("votify", "gytmdl", "gamdl", "ofscraper")) {
            $entry = "${tool}_entry.py"
            if (Test-Path $entry) {
              Write-Host "→ Building $tool from $entry"
              pyinstaller --onefile --name $tool --distpath dist $entry 2>&1
              if (Test-Path "dist/$tool.exe") {
                Compress-Archive -Path "dist/$tool.exe" -DestinationPath "staging/${tool}-${{ matrix.platform }}-${{ matrix.arch }}.zip" -Force
                Write-Host "✓ ${tool}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
              } else {
                Write-Host "⚠ PyInstaller output not found for $tool"
              }
            } else {
              Write-Host "⚠ $tool entry-point script not found"
            }
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue build, dist, *.spec
          }

      # Bonus: build aria2c from brew on macOS (no official pre-built binary)
      - name: "aria2c: macOS (brew)"
        if: matrix.platform == 'macos' && needs.check-versions.outputs.aria2c == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "→ Installing aria2c via Homebrew"
          brew install aria2
          ARIA2=$(which aria2c)
          if [ -n "$ARIA2" ]; then
            mkdir -p pkg && cp "$ARIA2" pkg/aria2c && chmod +x pkg/aria2c
            tar -czf staging/aria2c-macos-aarch64.tar.gz -C pkg aria2c
            rm -rf pkg
            echo "✓ aria2c-macos-aarch64.tar.gz"
          fi

      - name: List produced assets
        if: runner.os != 'Windows'
        run: |
          echo "=== Python tools (${{ matrix.platform }}-${{ matrix.arch }}) ==="
          ls -lh staging/ 2>/dev/null || echo "No assets produced"

      - name: List produced assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Python tools (${{ matrix.platform }}-${{ matrix.arch }}) ==="
          Get-ChildItem staging/ -ErrorAction SilentlyContinue | Format-Table Name, Length

      - uses: actions/upload-artifact@v7
        with:
          name: python-tools-${{ matrix.platform }}-${{ matrix.arch }}
          path: staging/
          retention-days: 1
          if-no-files-found: warn

  # =====================================================================
  # Job 3: Upload all assets to GitHub Releases
  # Creates a date-stamped release (e.g. 2026-02-25) and updates the
  # "latest" tag to always point at the newest release.
  #
  # On scheduled runs with partial rebuilds, carries forward unchanged
  # assets from the previous 'latest' release to ensure complete releases.
  # =====================================================================
  upload-release:
    needs: [check-versions, download-binaries, build-python-tools]
    runs-on: ubuntu-latest
    # Only upload on push/schedule/dispatch (not PRs), and only if something changed
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      needs.check-versions.outputs.any_changed == 'true' &&
      (needs.download-binaries.result == 'success' || needs.download-binaries.result == 'skipped') &&
      (needs.build-python-tools.result == 'success' || needs.build-python-tools.result == 'skipped') &&
      (needs.download-binaries.result == 'success' || needs.build-python-tools.result == 'success')
    steps:
      - uses: actions/checkout@v6

      # On scheduled partial rebuilds, carry forward unchanged assets
      - name: Carry forward assets from previous release
        if: needs.check-versions.outputs.force != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p staging
          echo "→ Downloading assets from previous 'latest' release"
          gh release download latest \
            --repo "${{ github.repository }}" \
            --dir staging/ 2>/dev/null || {
            echo "⚠ No previous 'latest' release found — new assets only"
          }
          echo "Carried forward $(ls staging/ 2>/dev/null | wc -l) assets"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: all-assets

      - name: Flatten new assets into staging
        run: |
          mkdir -p staging
          # New artifacts overwrite carried-forward ones
          find all-assets -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" \) \
            -exec cp {} staging/ \; 2>/dev/null || true
          # Remove the updated-versions artifact if it landed here
          rm -f staging/versions-new.json
          echo "=== All assets ==="
          ls -lh staging/
          echo "Total: $(ls staging/ | wc -l) assets"

      - name: Determine release tag
        id: tag
        run: |
          # Date-based tag: YYYY-MM-DD, with a numeric suffix if run multiple times per day
          BASE_TAG="$(date -u +%Y-%m-%d)"
          TAG="$BASE_TAG"
          SUFFIX=1
          while gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="${BASE_TAG}.${SUFFIX}"
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "→ Release tag: $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create date-stamped release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ASSET_COUNT=$(ls staging/ | wc -l)
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "⚠ No assets produced — skipping upload"
            exit 1
          fi

          echo "→ Creating release $TAG with $ASSET_COUNT assets..."
          gh release create "$TAG" staging/* \
            --repo "${{ github.repository }}" \
            --title "Tool Mirror — $TAG" \
            --notes "Automated tool mirror build from $(date -u +%Y-%m-%d).

          Triggered by: ${{ github.event_name }}
          Commit: ${{ github.sha }}
          Assets: $ASSET_COUNT" \
            --latest

          echo "✓ Release $TAG created (marked as Latest)"

      - name: Update 'latest' tag for stable download URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Delete old 'latest' release and tag if they exist
          gh release delete latest --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

          # Re-create 'latest' tag with same assets (for stable download URLs)
          # NOT marked as --latest so the date-stamped release stays featured
          gh release create latest staging/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --latest=false \
            --notes "Stable download tag — always points to the most recent build.

          Current build: **$TAG**
          Use \`/releases/download/latest/<asset>\` for URLs that always fetch the newest version."

          echo "✓ 'latest' tag updated to match $TAG"

      - name: Update versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the updated versions file from the check-versions job
          if [ -f all-assets/updated-versions/versions-new.json ]; then
            cp all-assets/updated-versions/versions-new.json versions.json
            echo "→ Updated versions.json from check-versions output"
          else
            echo "⚠ No updated versions file found — skipping versions.json update"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          if git diff --cached --quiet; then
            echo "→ versions.json unchanged"
          else
            git commit -m "ci: update versions.json [skip ci]"
            git push
            echo "✓ versions.json committed and pushed"
          fi

      - name: Summary
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "## Populate Tools — $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Asset | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          for file in staging/*; do
            name=$(basename "$file")
            size=$(du -h "$file" | cut -f1)
            echo "| \`$name\` | $size |" >> "$GITHUB_STEP_SUMMARY"
          done
